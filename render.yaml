services:
  - type: web
    name: backlogs-bot
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: SEATALK_APP_ID
        sync: false
      - key: SEATALK_APP_SECRET
        sync: false
      - key: SEATALK_SIGNING_SECRET
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: SHEET_ID
        value: 1_voFSQBXWh5G5IwBZnt19FE1ro9PpHGOGxtlJscnuzA
      - key: TAB_NAME
        value: Compliance Tracker
      - key: CAPTURE_RANGE
        value: A1:X80
      - key: BAU Backlogs Summary_TAB
        value: BAU Backlogs Summary
      - key: BOT_NAME
        value: Backlogs Bot
      - key: REPORT_LINK
        value: https://docs.google.com/spreadsheets/d/1_voFSQBXWh5G5IwBZnt19FE1ro9PpHGOGxtlJscnuzA/edit?gid=1804176550#gid=1804176550
      - key: APP_TIMEZONE
        value: Asia/Manila
      - key: ENABLE_CHANGE_SENDS
        value: "true"
      - key: WATCH_TAB
        value: BAU Backlogs Summary
      - key: WATCH_CELL
        value: G8
      - key: WATCH_POLL_SECONDS
        value: "5"
      - key: CHANGE_SETTLE_SECONDS
        value: "7"
      - key: ENABLE_SCHEDULED_SENDS
        value: "false"
      - key: IMAGE_FORMAT
        value: png
      - key: PNG_DPI
        value: "300"
      - key: PNG_MAX_WIDTH
        value: "2400"
      - key: WORK_DIR
        value: /app/tmp
